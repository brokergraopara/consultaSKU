<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Produtos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsividade -->
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background-color: #f9f9f9;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    header img {
      max-width: 180px;   /* tamanho máximo do logo */
      height: auto;
      margin-bottom: 10px;
    }

    h2 {
      text-align: center;
      color: #333;
      margin: 0;
    }

    .search-container {
      display: flex;
      justify-content: center;
      margin: 15px 0;
    }

    .search-container input {
      flex: 1;
      max-width: 400px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background-color: #fff;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background-color: #0078D7;
      color: white;
      font-weight: bold;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    /* Responsividade para telas pequenas */
    @media (max-width: 600px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        margin-bottom: 15px;
        background: #fff;
        border-radius: 8px;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }

      td {
        border: none;
        display: flex;
        justify-content: space-between;
        padding: 8px;
      }

      td::before {
        content: attr(data-label);
        font-weight: bold;
        color: #0078D7;
      }
    }
  </style>
</head>
<body>
  <header>
    <!-- Logo -->
    <img src="logo.png" alt="Logo da Empresa">
    <h2>Consulta de Produtos</h2>
  </header>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Digite SKU ou Descrição" oninput="search()">
  </div>

  <table id="resultTable">
    <thead>
      <tr>
        <th>SKU</th>
        <th>Descrição</th>
        <th>Validade</th>
        <th>Estoque</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let produtos = [];

    // Carregar CSV automaticamente
    fetch('produtos.csv')
      .then(response => response.text())
      .then(text => {
        const linhas = text.split(/\r?\n/).map(l => l.trim()).filter(l => l);
        produtos = linhas.slice(1).map(linha => {
          const partes = linha.split(';');
          return {
            sku: (partes[0] || "").trim(),
            descricao: (partes[1] || "").trim(),
            validade: (partes[2] || "").trim(),
            estoque: (partes[3] || "").trim()
          };
        });
        renderTable(produtos);
      })
      .catch(err => console.error("Erro ao carregar CSV:", err));

    function search() {
      const termo = document.getElementById('searchInput').value.toLowerCase().trim();
      if (termo === "") {
        renderTable(produtos);
        return;
      }
      const resultados = produtos.filter(p =>
        p.sku.toLowerCase().includes(termo) ||
        p.descricao.toLowerCase().includes(termo)
      );
      renderTable(resultados);
    }

    function renderTable(lista) {
      const tbody = document.querySelector('#resultTable tbody');
      tbody.innerHTML = '';
      lista.forEach(p => {
        const row = `<tr>
          <td data-label="SKU">${p.sku}</td>
          <td data-label="Descrição">${p.descricao}</td>
          <td data-label="Validade">${p.validade}</td>
          <td data-label="Estoque">${p.estoque}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }
  </script>
</body>
</html>
